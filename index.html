<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0e27">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='90' fill='%23ff6b35'>⚽</text></svg>">
  <title>World Cup 2026 Live</title>
  <style>
    :root {
      --bg: #0a0e27;
      --surface: #1a1f3a;
      --surface-light: #2d3561;
      --border: #3d4570;
      --accent: #ff6b35;
      --accent-alt: #004e89;
      --live: #ff1744;
      --gold: #ffd700;
      --text: #ffffff;
      --text-dim: #b0b5c0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg) 0%, #0f1729 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      gap: 0;
    }

    .header {
      padding: 20px 30px;
      background: linear-gradient(90deg, rgba(26,31,58,0.95) 0%, rgba(26,31,58,0.85) 100%);
      border-bottom: 3px solid var(--accent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 2.5em;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-info {
      text-align: right;
      font-size: 0.9em;
      color: var(--text-dim);
    }

    .live-match-container {
      background: linear-gradient(135deg, rgba(255,23,68,0.1) 0%, rgba(0,78,137,0.1) 100%);
      border-bottom: 2px solid var(--live);
      padding: 20px 30px;
      flex-shrink: 0;
    }

    .live-match {
      display: none;
      text-align: center;
    }

    .live-match.active {
      display: block;
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .live-status {
      display: inline-block;
      font-size: 0.8em;
      color: var(--live);
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--live); }
      50% { opacity: 0.5; text-shadow: 0 0 20px var(--live); }
    }

    .live-teams {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      margin: 15px 0;
    }

    .live-team {
      flex: 1;
      max-width: 180px;
    }

    .team-name {
      font-size: 1.3em;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .team-flag {
      font-size: 3.5em;
      margin-bottom: 8px;
    }

    .score-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 20px 0;
    }

    .score {
      font-size: 4em;
      font-weight: 900;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      min-width: 80px;
    }

    .score-separator {
      font-size: 2.5em;
      color: var(--accent);
      opacity: 0.6;
    }

    .live-time {
      font-size: 1.1em;
      color: var(--text-dim);
      margin-top: 10px;
    }

    .content-area {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px 30px;
      min-height: 0;
      overflow: hidden;
    }

    .section {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .section-title {
      font-size: 1.1em;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .matches-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      flex: 1;
    }

    .match-card {
      background: rgba(45, 53, 97, 0.6);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .match-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .match-card:hover {
      border-color: var(--accent);
      background: rgba(45, 53, 97, 0.9);
      transform: translateX(4px);
    }

    .match-card:hover::before {
      transform: translateX(0);
    }

    .match-card.live {
      border-color: var(--live);
      background: rgba(255, 23, 68, 0.15);
      box-shadow: 0 0 20px rgba(255, 23, 68, 0.3);
    }

    .match-time {
      font-size: 0.75em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .match-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .match-team {
      flex: 1;
      font-weight: 600;
      font-size: 0.95em;
    }

    .match-team-flag {
      font-size: 1.4em;
      margin-right: 6px;
    }

    .match-score {
      font-size: 1.2em;
      color: var(--gold);
      font-weight: 900;
      min-width: 50px;
      text-align: center;
    }

    .match-status {
      font-size: 0.7em;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .stats-section {
      background: rgba(45, 53, 97, 0.6);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 18px;
      backdrop-filter: blur(10px);
      overflow-y: auto;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .stat-item:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: var(--text-dim);
      font-size: 0.9em;
    }

    .stat-value {
      color: var(--gold);
      font-weight: 700;
      font-size: 1.1em;
    }

    .ticker-section {
      height: 60px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-alt) 100%);
      padding: 0 30px;
      display: flex;
      align-items: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .ticker-content {
      display: flex;
      gap: 50px;
      animation: scroll 40s linear infinite;
      white-space: nowrap;
      font-size: 1em;
      font-weight: 600;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .ticker-item {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .ticker-dot {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      flex-shrink: 0;
    }

    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-alt);
    }

    .no-live {
      text-align: center;
      color: var(--text-dim);
      padding: 40px;
      font-size: 1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚽ WORLD CUP 2026</h1>
      <div class="header-info">
        <div id="currentTime">--:--</div>
        <div id="matchCount">Loading...</div>
      </div>
    </div>

    <div class="live-match-container">
      <div id="noLive" class="no-live">
        No match currently playing. Next matches coming soon.
      </div>
      <div id="liveMatch" class="live-match">
        <div class="live-status" id="liveStatus">● LIVE NOW</div>
        <div class="live-teams">
          <div class="live-team">
            <div class="team-flag" id="team1Flag">🏳️</div>
            <div class="team-name" id="team1">Team A</div>
          </div>
          <div class="score-display">
            <div class="score" id="score1">0</div>
            <div class="score-separator">—</div>
            <div class="score" id="score2">0</div>
          </div>
          <div class="live-team">
            <div class="team-flag" id="team2Flag">🏳️</div>
            <div class="team-name" id="team2">Team B</div>
          </div>
        </div>
        <div class="live-time" id="liveTime">Minute 45'</div>
      </div>
    </div>

    <div class="content-area">
      <div class="section">
        <div class="section-title">Matches</div>
        <div class="matches-grid" id="bracket"></div>
      </div>

      <div class="section">
        <div class="section-title">Tournament Stats</div>
        <div class="stats-section" id="stats"></div>
      </div>
    </div>

    <div class="ticker-section">
      <div class="ticker-content" id="ticker"></div>
    </div>
  </div>

  <script>
    const API_KEY = 'zwc_free_4567732af16066e498ecb42b';
    const API_BASE = 'https://api.zafronix.com/fifa/worldcup/v1';

    const countryFlags = {
      'Mexico': '🇲🇽', 'USA': '🇺🇸', 'Canada': '🇨🇦', 'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Germany': '🇩🇪',
      'Spain': '🇪🇸', 'France': '🇫🇷', 'Italy': '🇮🇹', 'Netherlands': '🇳🇱', 'Belgium': '🇧🇪',
      'Portugal': '🇵🇹', 'Argentina': '🇦🇷', 'Brazil': '🇧🇷', 'Uruguay': '🇺🇾', 'Chile': '🇨🇱',
      'Colombia': '🇨🇴', 'Peru': '🇵🇪', 'Ecuador': '🇪🇨', 'Paraguay': '🇵🇾', 'Venezuela': '🇻🇪',
      'Japan': '🇯🇵', 'South Korea': '🇰🇷', 'Australia': '🇦🇺', 'Saudi Arabia': '🇸🇦', 'Iran': '🇮🇷',
      'United Arab Emirates': '🇦🇪', 'Morocco': '🇲🇦', 'Egypt': '🇪🇬', 'Senegal': '🇸🇳', 'Tunisia': '🇹🇳',
      'Cameroon': '🇨🇲', 'Ivory Coast': '🇨🇮', 'Ghana': '🇬🇭', 'Switzerland': '🇨🇭', 'Poland': '🇵🇱',
      'Serbia': '🇷🇸', 'Greece': '🇬🇷', 'Czech Republic': '🇨🇿', 'Croatia': '🇭🇷', 'Slovenia': '🇸🇮',
      'Denmark': '🇩🇰', 'Sweden': '🇸🇪', 'Norway': '🇳🇴', 'Romania': '🇷🇴', 'Turkey': '🇹🇷',
      'Ukraine': '🇺🇦', 'India': '🇮🇳', 'Thailand': '🇹🇭', 'Vietnam': '🇻🇳', 'New Zealand': '🇳🇿',
      'Costa Rica': '🇨🇷', 'Panama': '🇵🇦', 'Jamaica': '🇯🇲', 'Haiti': '🇭🇹', 'South Africa': '🇿🇦',
      'Wales': '🏴󠁧󠁢󠁷󠁬󠁳󠁿', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'Northern Ireland': '🇬🇧', 'Austria': '🇦🇹',
      'Hungary': '🇭🇺', 'Slovakia': '🇸🇰', 'Iceland': '🇮🇸', 'Ireland': '🇮🇪', 'Israel': '🇮🇱',
      'Lebanon': '🇱🇧', 'Jordan': '🇯🇴', 'Kazakhstan': '🇰🇿', 'Uzbekistan': '🇺🇿', 'Myanmar': '🇲🇲',
      'Malaysia': '🇲🇾', 'Singapore': '🇸🇬', 'Philippines': '🇵🇭', 'Indonesia': '🇮🇩', 'Hong Kong': '🇭🇰'
    };

    let matches = [];
    let stats = {};

    function getFlag(country) {
      return countryFlags[country] || '🏳️';
    }

    async function fetchMatchesAPI() {
      try {
        const response = await fetch(`${API_BASE}/matches?year=2026`, {
          headers: { 'X-API-Key': API_KEY }
        });
        const data = await response.json();

        if (data && data.data && data.data.length > 0) {
          matches = data.data.map(match => ({
            id: match.id,
            home: match.homeTeam,
            away: match.awayTeam,
            time: match.date,
            result: match.result,
            status: match.status === 'scheduled' || !match.status ? 'scheduled' : (match.status === 'live' ? 'live' : 'completed'),
            minute: match.liveMinute || 0,
          }));
          renderMatches();
          return true;
        }
        return false;
      } catch (error) {
        console.log('API error:', error.message);
        return false;
      }
    }

    function renderMatches() {
      const bracket = document.getElementById('bracket');
      bracket.innerHTML = '';

      matches.forEach(match => {
        const card = document.createElement('div');
        card.className = `match-card ${match.status === 'live' ? 'live' : ''}`;
        card.onclick = () => showLiveMatch(match);

        const timeEl = document.createElement('div');
        timeEl.className = 'match-time';
        timeEl.textContent = new Date(match.time).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        const contentEl = document.createElement('div');
        contentEl.className = 'match-content';
        contentEl.innerHTML = `
          <div class="match-team"><span class="match-team-flag">${getFlag(match.home)}</span>${match.home}</div>
          <div class="match-score">${match.result || '-'}</div>
          <div class="match-team"><span class="match-team-flag">${getFlag(match.away)}</span>${match.away}</div>
        `;

        const statusEl = document.createElement('div');
        statusEl.className = 'match-status';
        statusEl.textContent = match.status.toUpperCase() + (match.status === 'live' ? ` ${match.minute}'` : '');

        card.appendChild(timeEl);
        card.appendChild(contentEl);
        card.appendChild(statusEl);
        bracket.appendChild(card);
      });

      document.getElementById('matchCount').textContent = `${matches.length} Matches`;
    }

    function showLiveMatch(match) {
      const liveMatch = document.getElementById('liveMatch');
      const noLive = document.getElementById('noLive');

      if (match.status !== 'live') {
        noLive.style.display = 'block';
        liveMatch.classList.remove('active');
        return;
      }

      document.getElementById('team1').textContent = match.home;
      document.getElementById('team2').textContent = match.away;
      document.getElementById('team1Flag').textContent = getFlag(match.home);
      document.getElementById('team2Flag').textContent = getFlag(match.away);
      document.getElementById('liveTime').textContent = `Minute ${match.minute}'`;

      if (match.result) {
        const [s1, s2] = match.result.split('-');
        document.getElementById('score1').textContent = s1;
        document.getElementById('score2').textContent = s2;
      }

      noLive.style.display = 'none';
      liveMatch.classList.add('active');
    }

    function updateStats() {
      const liveCount = matches.filter(m => m.status === 'live').length;
      const completedCount = matches.filter(m => m.status === 'completed').length;
      const totalGoals = matches.reduce((sum, m) => {
        if (m.result) {
          const [a, b] = m.result.split('-').map(Number);
          return sum + a + b;
        }
        return sum;
      }, 0);

      const statsHtml = `
        <div class="stat-item">
          <span class="stat-label">🔴 Live Matches</span>
          <span class="stat-value">${liveCount}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">✅ Completed</span>
          <span class="stat-value">${completedCount}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">📅 Total Matches</span>
          <span class="stat-value">${matches.length}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">⚽ Total Goals</span>
          <span class="stat-value">${totalGoals}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">🏆 Stage</span>
          <span class="stat-value">Group</span>
        </div>
      `;
      document.getElementById('stats').innerHTML = statsHtml;
    }

    function updateTicker() {
      const ticker = document.getElementById('ticker');
      ticker.innerHTML = '';

      const items = [
        '📊 World Cup 2026 Live Coverage',
        '⚽ 48 Teams | 104 Matches',
        '🌍 Hosted by USA, Canada & Mexico',
        '🏆 Click matches for live details',
        '📡 Real-time updates every 30s',
      ];

      const tickerItems = [...items, ...items];
      tickerItems.forEach(text => {
        const item = document.createElement('div');
        item.className = 'ticker-item';
        item.innerHTML = `<div class="ticker-dot"></div><div>${text}</div>`;
        ticker.appendChild(item);
      });
    }

    function updateClock() {
      const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('currentTime').textContent = time;
    }

    async function init() {
      updateClock();
      updateTicker();
      setInterval(updateClock, 1000);

      const success = await fetchMatchesAPI();
      if (success) {
        updateStats();
        const liveMatch = matches.find(m => m.status === 'live');
        if (liveMatch) showLiveMatch(liveMatch);

        setInterval(() => {
          fetchMatchesAPI().then(success => {
            if (success) updateStats();
          });
        }, 30000);
      }
    }

    init();
  </script>
</body>
</html>
