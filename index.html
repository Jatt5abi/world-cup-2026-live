<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0e27">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='90' fill='%23ff6b35'>⚽</text></svg>">
  <title>World Cup 2026 Live</title>
  <style>
    :root {
      --bg: #0a0e27;
      --surface: #1a1f3a;
      --surface-light: #2d3561;
      --border: #3d4570;
      --accent: #ff6b35;
      --accent-alt: #004e89;
      --live: #ff1744;
      --gold: #ffd700;
      --text: #ffffff;
      --text-dim: #b0b5c0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg) 0%, #0f1729 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    .header {
      padding: 15px 20px;
      background: linear-gradient(90deg, rgba(26,31,58,0.95) 0%, rgba(26,31,58,0.85) 100%);
      border-bottom: 3px solid var(--accent);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.8em;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .main-content {
      display: flex;
      flex: 1;
      min-height: 0;
      gap: 15px;
      padding: 15px;
    }

    .sidebar {
      width: 280px;
      background: rgba(26, 31, 58, 0.9);
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow-y: auto;
      padding: 15px;
      backdrop-filter: blur(10px);
    }

    .group {
      margin-bottom: 20px;
      padding: 12px;
      background: rgba(45, 53, 97, 0.6);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .group-name {
      font-size: 0.85em;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .team-item {
      padding: 8px 10px;
      margin-bottom: 6px;
      background: rgba(26, 31, 58, 0.8);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.85em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .team-item:hover {
      border-color: var(--accent);
      background: rgba(45, 53, 97, 0.8);
      transform: translateX(4px);
    }

    .team-item.active {
      border-color: var(--live);
      background: rgba(255, 23, 68, 0.2);
      color: var(--live);
    }

    .team-flag {
      font-size: 1.2em;
      flex-shrink: 0;
    }

    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-width: 0;
    }

    .live-window {
      background: linear-gradient(135deg, rgba(255,23,68,0.1) 0%, rgba(0,78,137,0.1) 100%);
      border: 2px solid var(--live);
      border-radius: 8px;
      padding: 15px;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .live-match {
      display: none;
      text-align: center;
    }

    .live-match.active {
      display: block;
    }

    .live-status {
      display: inline-block;
      font-size: 0.75em;
      color: var(--live);
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--live); }
      50% { opacity: 0.5; text-shadow: 0 0 20px var(--live); }
    }

    .live-teams {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin: 10px 0;
    }

    .live-team {
      flex: 1;
    }

    .team-name {
      font-size: 0.9em;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .team-flag-large {
      font-size: 2em;
      margin: 6px 0;
    }

    .score-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .score {
      font-size: 2.5em;
      font-weight: 900;
      color: var(--gold);
      min-width: 50px;
    }

    .score-separator {
      font-size: 1.5em;
      color: var(--accent);
      opacity: 0.6;
    }

    .live-time {
      font-size: 0.8em;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .no-live {
      text-align: center;
      color: var(--text-dim);
      padding: 20px;
      font-size: 0.85em;
    }

    .pitch-container {
      flex: 1;
      background: linear-gradient(180deg, #2d5a3d 0%, #1f4d2d 100%);
      border: 3px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      position: relative;
      overflow: hidden;
    }

    .pitch {
      width: 90%;
      height: 90%;
      position: relative;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(60, 140, 60, 0.8) 0%, rgba(40, 100, 40, 0.8) 100%);
    }

    .pitch-center {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .pitch-center::before {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .pitch-line-h {
      position: absolute;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.2);
      top: 50%;
      left: 0;
    }

    .pitch-area {
      position: absolute;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .pitch-area-top {
      width: 100%;
      height: 25%;
      top: 0;
      left: 0;
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    }

    .pitch-area-bottom {
      width: 100%;
      height: 25%;
      bottom: 0;
      left: 0;
      border-top: 2px solid rgba(255, 255, 255, 0.2);
    }

    .player {
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65em;
      font-weight: 700;
      border: 2px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }

    .player:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(255, 107, 53, 0.6);
    }

    .player.home {
      background: rgba(255, 107, 53, 0.8);
      color: white;
      border-color: var(--accent);
    }

    .player.away {
      background: rgba(0, 78, 137, 0.8);
      color: white;
      border-color: var(--accent-alt);
    }

    .formation-info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 0.75em;
      color: var(--text-dim);
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 10px;
      border-radius: 4px;
    }

    .ticker-section {
      height: 50px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-alt) 100%);
      padding: 0 20px;
      display: flex;
      align-items: center;
      overflow: hidden;
      flex-shrink: 0;
      border-radius: 8px;
    }

    .ticker-content {
      display: flex;
      gap: 40px;
      animation: scroll 40s linear infinite;
      white-space: nowrap;
      font-size: 0.9em;
      font-weight: 600;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .ticker-item {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .ticker-dot {
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
    }

    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 3px;
    }

    .pitch-empty {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85em;
    }

    .pitch-results-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 15px;
      flex: 1;
      min-height: 0;
    }

    .results-panel {
      background: rgba(26, 31, 58, 0.9);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      backdrop-filter: blur(10px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .results-title {
      font-size: 0.8em;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }

    .result-item {
      background: rgba(45, 53, 97, 0.6);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      font-size: 0.75em;
    }

    .result-date {
      color: var(--text-dim);
      margin-bottom: 4px;
      font-size: 0.7em;
    }

    .result-match {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .result-team {
      flex: 1;
      text-align: left;
    }

    .result-score {
      color: var(--gold);
      font-weight: 700;
      min-width: 30px;
      text-align: center;
    }

    .result-status {
      font-size: 0.65em;
      color: var(--accent);
      padding-top: 4px;
      text-transform: uppercase;
    }

    .standings-item {
      background: rgba(45, 53, 97, 0.6);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      font-size: 0.75em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .standing-team {
      flex: 1;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .standing-stats {
      display: flex;
      gap: 8px;
      font-weight: 600;
      color: var(--text-dim);
    }

    .standing-pts {
      color: var(--gold);
      font-weight: 700;
      min-width: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚽ WORLD CUP 2026</h1>
    </div>

    <div class="main-content">
      <div class="sidebar" id="groupsContainer"></div>

      <div class="center-content">
        <div class="live-window">
          <div id="noLive" class="no-live">
            ⏳ No match currently playing
          </div>
          <div id="liveMatch" class="live-match">
            <div class="live-status">● LIVE</div>
            <div class="live-teams">
              <div class="live-team">
                <div class="team-flag-large" id="team1Flag">🏳️</div>
                <div class="team-name" id="team1">Team A</div>
              </div>
              <div class="score-display">
                <div class="score" id="score1">0</div>
                <div class="score-separator">—</div>
                <div class="score" id="score2">0</div>
              </div>
              <div class="live-team">
                <div class="team-flag-large" id="team2Flag">🏳️</div>
                <div class="team-name" id="team2">Team B</div>
              </div>
            </div>
            <div class="live-time" id="liveTime">Minute 45'</div>
          </div>
        </div>

        <div class="pitch-results-row">
          <div class="pitch-container" id="pitchContainer">
            <div class="pitch-empty">← Select a team from the groups</div>
          </div>
          <div class="results-panel">
            <div class="results-title">Results & Standings</div>
            <div id="resultsContent">
              <div style="text-align: center; color: var(--text-dim); padding: 20px; font-size: 0.8em;">
                Select a team to see results
              </div>
            </div>
          </div>
        </div>

        <div class="ticker-section">
          <div class="ticker-content" id="ticker"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = 'zwc_free_4567732af16066e498ecb42b';
    const API_BASE = 'https://api.zafronix.com/fifa/worldcup/v1';

    const countryFlags = {
      'Mexico': '🇲🇽', 'USA': '🇺🇸', 'Canada': '🇨🇦', 'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Germany': '🇩🇪',
      'Spain': '🇪🇸', 'France': '🇫🇷', 'Italy': '🇮🇹', 'Netherlands': '🇳🇱', 'Belgium': '🇧🇪',
      'Portugal': '🇵🇹', 'Argentina': '🇦🇷', 'Brazil': '🇧🇷', 'Uruguay': '🇺🇾', 'Chile': '🇨🇱',
      'Colombia': '🇨🇴', 'Peru': '🇵🇪', 'Ecuador': '🇪🇨', 'Paraguay': '🇵🇾', 'Venezuela': '🇻🇪',
      'Japan': '🇯🇵', 'South Korea': '🇰🇷', 'Australia': '🇦🇺', 'Saudi Arabia': '🇸🇦', 'Iran': '🇮🇷',
      'United Arab Emirates': '🇦🇪', 'Morocco': '🇲🇦', 'Egypt': '🇪🇬', 'Senegal': '🇸🇳', 'Tunisia': '🇹🇳',
      'Cameroon': '🇨🇲', 'Ivory Coast': '🇨🇮', 'Ghana': '🇬🇭', 'Switzerland': '🇨🇭', 'Poland': '🇵🇱',
      'Serbia': '🇷🇸', 'Greece': '🇬🇷', 'Czech Republic': '🇨🇿', 'Croatia': '🇭🇷', 'Slovenia': '🇸🇮',
      'Denmark': '🇩🇰', 'Sweden': '🇸🇪', 'Norway': '🇳🇴', 'Romania': '🇷🇴', 'Turkey': '🇹🇷',
      'Ukraine': '🇺🇦', 'India': '🇮🇳', 'Thailand': '🇹🇭', 'Vietnam': '🇻🇳', 'New Zealand': '🇳🇿',
      'Costa Rica': '🇨🇷', 'Panama': '🇵🇦', 'Jamaica': '🇯🇲', 'Haiti': '🇭🇹', 'South Africa': '🇿🇦',
      'Wales': '🏴󠁧󠁢󠁷󠁬󠁳󠁿', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'Northern Ireland': '🇬🇧', 'Austria': '🇦🇹',
      'Hungary': '🇭🇺', 'Slovakia': '🇸🇰', 'Iceland': '🇮🇸', 'Ireland': '🇮🇪', 'Israel': '🇮🇱',
      'Lebanon': '🇱🇧', 'Jordan': '🇯🇴', 'Kazakhstan': '🇰🇿', 'Uzbekistan': '🇺🇿', 'Myanmar': '🇲🇲',
      'Malaysia': '🇲🇾', 'Singapore': '🇸🇬', 'Philippines': '🇵🇭', 'Indonesia': '🇮🇩', 'Hong Kong': '🇭🇰'
    };

    const formations = {
      'Brazil': { formation: '4-3-3', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'RM', 'CM', 'LM', 'RF', 'CF', 'LF'] },
      'England': { formation: '4-2-3-1', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'DM', 'DM', 'RF', 'CM', 'LF', 'CF'] },
      'Germany': { formation: '4-1-4-1', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'DM', 'RF', 'CM', 'CM', 'LF', 'CF'] },
      'France': { formation: '4-2-3-1', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'DM', 'DM', 'RF', 'CM', 'LF', 'CF'] },
      'Argentina': { formation: '4-3-3', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'RM', 'CM', 'LM', 'RF', 'CF', 'LF'] },
      'Spain': { formation: '4-1-4-1', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'DM', 'RF', 'CM', 'CM', 'LF', 'CF'] },
    };

    const defaultFormation = { formation: '4-4-2', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'RM', 'CM', 'CM', 'LM', 'CF', 'CF'] };

    let matches = [];
    let groups = {};
    let selectedTeam = null;

    function getFlag(country) {
      return countryFlags[country] || '🏳️';
    }

    async function fetchTeams() {
      try {
        const response = await fetch(`${API_BASE}/tournaments/2026`, {
          headers: { 'X-API-Key': API_KEY }
        });
        const data = await response.json();

        if (data && data.teams) {
          groups = {};
          data.teams.forEach(team => {
            const group = team.groupStage?.group;
            if (group) {
              if (!groups[group]) groups[group] = [];
              groups[group].push(team.name);
            }
          });
          renderGroups();
          return true;
        }
      } catch (error) {
        console.log('Error fetching teams:', error.message);
      }
      return false;
    }

    function renderGroups() {
      const container = document.getElementById('groupsContainer');
      container.innerHTML = '';

      Object.keys(groups).sort().forEach(groupName => {
        const groupEl = document.createElement('div');
        groupEl.className = 'group';
        const nameEl = document.createElement('div');
        nameEl.className = 'group-name';
        nameEl.textContent = `Group ${groupName}`;
        groupEl.appendChild(nameEl);

        groups[groupName].forEach(team => {
          const teamEl = document.createElement('div');
          teamEl.className = 'team-item';
          if (selectedTeam === team) teamEl.classList.add('active');
          teamEl.innerHTML = `<span class="team-flag">${getFlag(team)}</span>${team}`;
          teamEl.onclick = () => selectTeam(team);
          groupEl.appendChild(teamEl);
        });

        container.appendChild(groupEl);
      });
    }

    function selectTeam(team) {
      selectedTeam = team;
      renderGroups();
      renderFormation(team);
      renderTeamResults(team);
    }

    function renderFormation(team) {
      const container = document.getElementById('pitchContainer');
      const formation = formations[team] || defaultFormation;

      container.innerHTML = `
        <div class="pitch">
          <div class="pitch-line-h"></div>
          <div class="pitch-area pitch-area-top"></div>
          <div class="pitch-area pitch-area-bottom"></div>
          <div class="pitch-center">
            <div class="pitch-center"></div>
          </div>
          <div id="players"></div>
          <div class="formation-info">${team} • ${formation.formation}</div>
        </div>
      `;

      const positions = getFormationPositions(formation.formation);
      const playersEl = document.getElementById('players');

      positions.forEach((pos, idx) => {
        const player = document.createElement('div');
        player.className = `player home`;
        player.textContent = idx + 1;
        player.style.left = pos.x + '%';
        player.style.top = pos.y + '%';
        player.style.transform = 'translate(-50%, -50%)';
        playersEl.appendChild(player);
      });
    }

    function getFormationPositions(formation) {
      const positions = [];
      const [def, mid, att] = formation.split('-').map(Number);

      // GK
      positions.push({ x: 50, y: 10 });

      // Defenders
      const defY = 22;
      const defSpacing = 100 / (def + 1);
      for (let i = 0; i < def; i++) {
        positions.push({ x: (i + 1) * defSpacing, y: defY });
      }

      // Midfielders
      const midY = 50;
      const midSpacing = 100 / (mid + 1);
      for (let i = 0; i < mid; i++) {
        positions.push({ x: (i + 1) * midSpacing, y: midY });
      }

      // Attackers
      const attY = 78;
      const attSpacing = 100 / (att + 1);
      for (let i = 0; i < att; i++) {
        positions.push({ x: (i + 1) * attSpacing, y: attY });
      }

      return positions;
    }

    function renderTeamResults(team) {
      const resultsContent = document.getElementById('resultsContent');

      // Get team's group and standings
      let teamGroup = null;
      for (const [group, teams] of Object.entries(groups)) {
        if (teams.includes(team)) {
          teamGroup = group;
          break;
        }
      }

      // Get team's matches
      const teamMatches = matches.filter(m => m.home === team || m.away === team);
      const completedMatches = teamMatches.filter(m => m.status === 'completed').slice(0, 5);

      let html = '';

      if (completedMatches.length > 0) {
        html += '<div class="results-title" style="margin-top: 0;">Recent Results</div>';
        completedMatches.forEach(match => {
          const isHome = match.home === team;
          const opponent = isHome ? match.away : match.home;
          const [s1, s2] = match.result ? match.result.split('-').map(Number) : [0, 0];
          const teamScore = isHome ? s1 : s2;
          const oppScore = isHome ? s2 : s1;
          const status = teamScore > oppScore ? 'W' : teamScore < oppScore ? 'L' : 'D';

          html += `
            <div class="result-item">
              <div class="result-date">${new Date(match.time).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
              <div class="result-match">
                <div class="result-team">${isHome ? team : opponent}</div>
                <div class="result-score">${teamScore}-${oppScore}</div>
                <div class="result-team">${isHome ? opponent : team}</div>
              </div>
              <div class="result-status">${status}</div>
            </div>
          `;
        });
      }

      // Group standings
      if (teamGroup) {
        html += '<div class="results-title" style="margin-top: 12px;">Group ' + teamGroup + '</div>';
        const groupTeams = groups[teamGroup] || [];
        groupTeams.forEach(t => {
          const tMatches = matches.filter(m => (m.home === t || m.away === t) && m.status === 'completed');
          let wins = 0, draws = 0, losses = 0, goalsFor = 0, goalsAgainst = 0;

          tMatches.forEach(m => {
            const isHome = m.home === t;
            const [s1, s2] = m.result ? m.result.split('-').map(Number) : [0, 0];
            const tScore = isHome ? s1 : s2;
            const oScore = isHome ? s2 : s1;
            goalsFor += tScore;
            goalsAgainst += oScore;
            if (tScore > oScore) wins++;
            else if (tScore === oScore) draws++;
            else losses++;
          });

          const pts = wins * 3 + draws;
          html += `
            <div class="standings-item">
              <div class="standing-team">
                <span>${getFlag(t)}</span>
                <span>${t}</span>
              </div>
              <div class="standing-stats">
                <span>${wins}W ${draws}D ${losses}L</span>
                <span class="standing-pts">${pts}pts</span>
              </div>
            </div>
          `;
        });
      }

      if (html === '') {
        html = '<div style="text-align: center; color: var(--text-dim); padding: 20px; font-size: 0.8em;">No data yet</div>';
      }

      resultsContent.innerHTML = html;
    }

    async function fetchMatches() {
      try {
        const response = await fetch(`${API_BASE}/matches?year=2026`, {
          headers: { 'X-API-Key': API_KEY }
        });
        const data = await response.json();

        if (data && data.data) {
          matches = data.data.map(match => ({
            id: match.id,
            home: match.homeTeam,
            away: match.awayTeam,
            time: match.date,
            result: match.result,
            status: match.status === 'scheduled' || !match.status ? 'scheduled' : (match.status === 'live' ? 'live' : 'completed'),
            minute: match.liveMinute || 0,
          }));
          return true;
        }
      } catch (error) {
        console.log('Error fetching matches:', error.message);
      }
      return false;
    }

    function showLiveMatch(match) {
      const liveMatch = document.getElementById('liveMatch');
      const noLive = document.getElementById('noLive');

      if (match.status !== 'live') {
        noLive.style.display = 'block';
        liveMatch.classList.remove('active');
        return;
      }

      document.getElementById('team1').textContent = match.home;
      document.getElementById('team2').textContent = match.away;
      document.getElementById('team1Flag').textContent = getFlag(match.home);
      document.getElementById('team2Flag').textContent = getFlag(match.away);
      document.getElementById('liveTime').textContent = `Minute ${match.minute}'`;

      if (match.result) {
        const [s1, s2] = match.result.split('-');
        document.getElementById('score1').textContent = s1;
        document.getElementById('score2').textContent = s2;
      }

      noLive.style.display = 'none';
      liveMatch.classList.add('active');
    }

    function updateTicker() {
      const ticker = document.getElementById('ticker');
      ticker.innerHTML = '';

      const items = [
        '📊 World Cup 2026 Live',
        '⚽ 48 Teams | 12 Groups',
        '🌍 Click teams to see formation',
        '📡 Real-time updates',
      ];

      const tickerItems = [...items, ...items];
      tickerItems.forEach(text => {
        const item = document.createElement('div');
        item.className = 'ticker-item';
        item.innerHTML = `<div class="ticker-dot"></div><div>${text}</div>`;
        ticker.appendChild(item);
      });
    }

    async function init() {
      updateTicker();
      await fetchTeams();
      const success = await fetchMatches();

      if (success) {
        const liveMatch = matches.find(m => m.status === 'live');
        if (liveMatch) showLiveMatch(liveMatch);

        setInterval(() => {
          fetchMatches().then(success => {
            if (success) {
              const liveMatch = matches.find(m => m.status === 'live');
              if (liveMatch) showLiveMatch(liveMatch);
            }
          });
        }, 30000);
      }
    }

    init();
  </script>
</body>
</html>
