<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0e27">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='90' fill='%23ff6b35'>вЪљ</text></svg>">
  <title>World Cup 2026 Live</title>
  <style>
    :root {
      --bg: #0a0e27;
      --surface: #1a1f3a;
      --surface-light: #2d3561;
      --border: #3d4570;
      --accent: #ff6b35;
      --accent-alt: #004e89;
      --live: #ff1744;
      --gold: #ffd700;
      --text: #ffffff;
      --text-dim: #b0b5c0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg) 0%, #0f1729 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    .header {
      padding: 15px 20px;
      background: linear-gradient(90deg, rgba(26,31,58,0.95) 0%, rgba(26,31,58,0.85) 100%);
      border-bottom: 3px solid var(--accent);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.8em;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .main-content {
      display: flex;
      flex: 1;
      min-height: 0;
      gap: 15px;
      padding: 15px;
    }

    .sidebar {
      width: 280px;
      background: rgba(26, 31, 58, 0.9);
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow-y: auto;
      padding: 15px;
      backdrop-filter: blur(10px);
    }

    .group {
      margin-bottom: 20px;
      padding: 12px;
      background: rgba(45, 53, 97, 0.6);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .group-name {
      font-size: 0.85em;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .team-item {
      padding: 8px 10px;
      margin-bottom: 6px;
      background: rgba(26, 31, 58, 0.8);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.85em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .team-item:hover {
      border-color: var(--accent);
      background: rgba(45, 53, 97, 0.8);
      transform: translateX(4px);
    }

    .team-item.active {
      border-color: var(--live);
      background: rgba(255, 23, 68, 0.2);
      color: var(--live);
    }

    .team-flag {
      font-size: 1.2em;
      flex-shrink: 0;
    }

    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-width: 0;
    }

    .live-window {
      background: linear-gradient(135deg, rgba(255,23,68,0.1) 0%, rgba(0,78,137,0.1) 100%);
      border: 2px solid var(--live);
      border-radius: 8px;
      padding: 15px;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .live-match {
      display: none;
      text-align: center;
    }

    .live-match.active {
      display: block;
    }

    .live-status {
      display: inline-block;
      font-size: 0.75em;
      color: var(--live);
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--live); }
      50% { opacity: 0.5; text-shadow: 0 0 20px var(--live); }
    }

    .live-teams {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin: 10px 0;
    }

    .live-team {
      flex: 1;
    }

    .team-name {
      font-size: 0.9em;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .team-flag-large {
      font-size: 2em;
      margin: 6px 0;
    }

    .score-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .score {
      font-size: 2.5em;
      font-weight: 900;
      color: var(--gold);
      min-width: 50px;
    }

    .score-separator {
      font-size: 1.5em;
      color: var(--accent);
      opacity: 0.6;
    }

    .live-time {
      font-size: 0.8em;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .no-live {
      text-align: center;
      color: var(--text-dim);
      padding: 20px;
      font-size: 0.85em;
    }

    .pitch-container {
      flex: 1;
      background: linear-gradient(180deg, #2d5a3d 0%, #1f4d2d 100%);
      border: 3px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      position: relative;
      overflow: hidden;
    }

    .pitch {
      width: 90%;
      height: 90%;
      position: relative;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(60, 140, 60, 0.8) 0%, rgba(40, 100, 40, 0.8) 100%);
    }

    .pitch-center {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .pitch-center::before {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .pitch-line-h {
      position: absolute;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.2);
      top: 50%;
      left: 0;
    }

    .pitch-area {
      position: absolute;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .pitch-area-top {
      width: 100%;
      height: 25%;
      top: 0;
      left: 0;
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    }

    .pitch-area-bottom {
      width: 100%;
      height: 25%;
      bottom: 0;
      left: 0;
      border-top: 2px solid rgba(255, 255, 255, 0.2);
    }

    .player {
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65em;
      font-weight: 700;
      border: 2px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }

    .player:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(255, 107, 53, 0.6);
    }

    .player.home {
      background: rgba(255, 107, 53, 0.8);
      color: white;
      border-color: var(--accent);
    }

    .player.away {
      background: rgba(0, 78, 137, 0.8);
      color: white;
      border-color: var(--accent-alt);
    }

    .formation-info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 0.75em;
      color: var(--text-dim);
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 10px;
      border-radius: 4px;
    }

    .ticker-section {
      height: 50px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-alt) 100%);
      padding: 0 20px;
      display: flex;
      align-items: center;
      overflow: hidden;
      flex-shrink: 0;
      border-radius: 8px;
    }

    .ticker-content {
      display: flex;
      gap: 40px;
      animation: scroll 40s linear infinite;
      white-space: nowrap;
      font-size: 0.9em;
      font-weight: 600;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .ticker-item {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .ticker-dot {
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
    }

    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 3px;
    }

    .pitch-empty {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>вЪљ WORLD CUP 2026</h1>
    </div>

    <div class="main-content">
      <div class="sidebar" id="groupsContainer"></div>

      <div class="center-content">
        <div class="live-window">
          <div id="noLive" class="no-live">
            вП≥ No match currently playing
          </div>
          <div id="liveMatch" class="live-match">
            <div class="live-status">вЧП LIVE</div>
            <div class="live-teams">
              <div class="live-team">
                <div class="team-flag-large" id="team1Flag">рЯП≥пЄП</div>
                <div class="team-name" id="team1">Team A</div>
              </div>
              <div class="score-display">
                <div class="score" id="score1">0</div>
                <div class="score-separator">вАФ</div>
                <div class="score" id="score2">0</div>
              </div>
              <div class="live-team">
                <div class="team-flag-large" id="team2Flag">рЯП≥пЄП</div>
                <div class="team-name" id="team2">Team B</div>
              </div>
            </div>
            <div class="live-time" id="liveTime">Minute 45'</div>
          </div>
        </div>

        <div class="pitch-container" id="pitchContainer">
          <div class="pitch-empty">вЖР Select a team from the groups</div>
        </div>

        <div class="ticker-section">
          <div class="ticker-content" id="ticker"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = 'zwc_free_4567732af16066e498ecb42b';
    const API_BASE = 'https://api.zafronix.com/fifa/worldcup/v1';

    const countryFlags = {
      'Mexico': 'рЯЗ≤рЯЗљ', 'USA': 'рЯЗЇрЯЗЄ', 'Canada': 'рЯЗ®рЯЗ¶', 'England': 'рЯПіу†БІу†БҐу†Б•у†БЃу†БІу†Бњ', 'Germany': 'рЯЗ©рЯЗ™',
      'Spain': 'рЯЗ™рЯЗЄ', 'France': 'рЯЗЂрЯЗЈ', 'Italy': 'рЯЗЃрЯЗє', 'Netherlands': 'рЯЗ≥рЯЗ±', 'Belgium': 'рЯЗІрЯЗ™',
      'Portugal': 'рЯЗµрЯЗє', 'Argentina': 'рЯЗ¶рЯЗЈ', 'Brazil': 'рЯЗІрЯЗЈ', 'Uruguay': 'рЯЗЇрЯЗЊ', 'Chile': 'рЯЗ®рЯЗ±',
      'Colombia': 'рЯЗ®рЯЗі', 'Peru': 'рЯЗµрЯЗ™', 'Ecuador': 'рЯЗ™рЯЗ®', 'Paraguay': 'рЯЗµрЯЗЊ', 'Venezuela': 'рЯЗїрЯЗ™',
      'Japan': 'рЯЗѓрЯЗµ', 'South Korea': 'рЯЗ∞рЯЗЈ', 'Australia': 'рЯЗ¶рЯЗЇ', 'Saudi Arabia': 'рЯЗЄрЯЗ¶', 'Iran': 'рЯЗЃрЯЗЈ',
      'United Arab Emirates': 'рЯЗ¶рЯЗ™', 'Morocco': 'рЯЗ≤рЯЗ¶', 'Egypt': 'рЯЗ™рЯЗђ', 'Senegal': 'рЯЗЄрЯЗ≥', 'Tunisia': 'рЯЗєрЯЗ≥',
      'Cameroon': 'рЯЗ®рЯЗ≤', 'Ivory Coast': 'рЯЗ®рЯЗЃ', 'Ghana': 'рЯЗђрЯЗ≠', 'Switzerland': 'рЯЗ®рЯЗ≠', 'Poland': 'рЯЗµрЯЗ±',
      'Serbia': 'рЯЗЈрЯЗЄ', 'Greece': 'рЯЗђрЯЗЈ', 'Czech Republic': 'рЯЗ®рЯЗњ', 'Croatia': 'рЯЗ≠рЯЗЈ', 'Slovenia': 'рЯЗЄрЯЗЃ',
      'Denmark': 'рЯЗ©рЯЗ∞', 'Sweden': 'рЯЗЄрЯЗ™', 'Norway': 'рЯЗ≥рЯЗі', 'Romania': 'рЯЗЈрЯЗі', 'Turkey': 'рЯЗєрЯЗЈ',
      'Ukraine': 'рЯЗЇрЯЗ¶', 'India': 'рЯЗЃрЯЗ≥', 'Thailand': 'рЯЗєрЯЗ≠', 'Vietnam': 'рЯЗїрЯЗ≥', 'New Zealand': 'рЯЗ≥рЯЗњ',
      'Costa Rica': 'рЯЗ®рЯЗЈ', 'Panama': 'рЯЗµрЯЗ¶', 'Jamaica': 'рЯЗѓрЯЗ≤', 'Haiti': 'рЯЗ≠рЯЗє', 'South Africa': 'рЯЗњрЯЗ¶',
      'Wales': 'рЯПіу†БІу†БҐу†БЈу†Бђу†Б≥у†Бњ', 'Scotland': 'рЯПіу†БІу†БҐу†Б≥у†Б£у†Біу†Бњ', 'Northern Ireland': 'рЯЗђрЯЗІ', 'Austria': 'рЯЗ¶рЯЗє',
      'Hungary': 'рЯЗ≠рЯЗЇ', 'Slovakia': 'рЯЗЄрЯЗ∞', 'Iceland': 'рЯЗЃрЯЗЄ', 'Ireland': 'рЯЗЃрЯЗ™', 'Israel': 'рЯЗЃрЯЗ±',
      'Lebanon': 'рЯЗ±рЯЗІ', 'Jordan': 'рЯЗѓрЯЗі', 'Kazakhstan': 'рЯЗ∞рЯЗњ', 'Uzbekistan': 'рЯЗЇрЯЗњ', 'Myanmar': 'рЯЗ≤рЯЗ≤',
      'Malaysia': 'рЯЗ≤рЯЗЊ', 'Singapore': 'рЯЗЄрЯЗђ', 'Philippines': 'рЯЗµрЯЗ≠', 'Indonesia': 'рЯЗЃрЯЗ©', 'Hong Kong': 'рЯЗ≠рЯЗ∞'
    };

    const formations = {
      'Brazil': { formation: '4-3-3', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'RM', 'CM', 'LM', 'RF', 'CF', 'LF'] },
      'England': { formation: '4-2-3-1', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'DM', 'DM', 'RF', 'CM', 'LF', 'CF'] },
      'Germany': { formation: '4-1-4-1', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'DM', 'RF', 'CM', 'CM', 'LF', 'CF'] },
      'France': { formation: '4-2-3-1', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'DM', 'DM', 'RF', 'CM', 'LF', 'CF'] },
      'Argentina': { formation: '4-3-3', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'RM', 'CM', 'LM', 'RF', 'CF', 'LF'] },
      'Spain': { formation: '4-1-4-1', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'DM', 'RF', 'CM', 'CM', 'LF', 'CF'] },
    };

    const defaultFormation = { formation: '4-4-2', starters: ['GK', 'RB', 'CB', 'CB', 'LB', 'RM', 'CM', 'CM', 'LM', 'CF', 'CF'] };

    let matches = [];
    let groups = {};
    let selectedTeam = null;

    function getFlag(country) {
      return countryFlags[country] || 'рЯП≥пЄП';
    }

    async function fetchTeams() {
      try {
        const response = await fetch(`${API_BASE}/tournaments/2026`, {
          headers: { 'X-API-Key': API_KEY }
        });
        const data = await response.json();

        if (data && data.teams) {
          groups = {};
          data.teams.forEach(team => {
            const group = team.groupStage?.group;
            if (group) {
              if (!groups[group]) groups[group] = [];
              groups[group].push(team.name);
            }
          });
          renderGroups();
          return true;
        }
      } catch (error) {
        console.log('Error fetching teams:', error.message);
      }
      return false;
    }

    function renderGroups() {
      const container = document.getElementById('groupsContainer');
      container.innerHTML = '';

      Object.keys(groups).sort().forEach(groupName => {
        const groupEl = document.createElement('div');
        groupEl.className = 'group';
        const nameEl = document.createElement('div');
        nameEl.className = 'group-name';
        nameEl.textContent = `Group ${groupName}`;
        groupEl.appendChild(nameEl);

        groups[groupName].forEach(team => {
          const teamEl = document.createElement('div');
          teamEl.className = 'team-item';
          if (selectedTeam === team) teamEl.classList.add('active');
          teamEl.innerHTML = `<span class="team-flag">${getFlag(team)}</span>${team}`;
          teamEl.onclick = () => selectTeam(team);
          groupEl.appendChild(teamEl);
        });

        container.appendChild(groupEl);
      });
    }

    function selectTeam(team) {
      selectedTeam = team;
      renderGroups();
      renderFormation(team);
    }

    function renderFormation(team) {
      const container = document.getElementById('pitchContainer');
      const formation = formations[team] || defaultFormation;

      container.innerHTML = `
        <div class="pitch">
          <div class="pitch-line-h"></div>
          <div class="pitch-area pitch-area-top"></div>
          <div class="pitch-area pitch-area-bottom"></div>
          <div class="pitch-center">
            <div class="pitch-center"></div>
          </div>
          <div id="players"></div>
          <div class="formation-info">${team} вАҐ ${formation.formation}</div>
        </div>
      `;

      const positions = getFormationPositions(formation.formation);
      const playersEl = document.getElementById('players');

      positions.forEach((pos, idx) => {
        const player = document.createElement('div');
        player.className = `player home`;
        player.textContent = idx + 1;
        player.style.left = pos.x + '%';
        player.style.top = pos.y + '%';
        player.style.transform = 'translate(-50%, -50%)';
        playersEl.appendChild(player);
      });
    }

    function getFormationPositions(formation) {
      const positions = [];
      const [def, mid, att] = formation.split('-').map(Number);

      // GK
      positions.push({ x: 50, y: 10 });

      // Defenders
      const defY = 22;
      const defSpacing = 100 / (def + 1);
      for (let i = 0; i < def; i++) {
        positions.push({ x: (i + 1) * defSpacing, y: defY });
      }

      // Midfielders
      const midY = 50;
      const midSpacing = 100 / (mid + 1);
      for (let i = 0; i < mid; i++) {
        positions.push({ x: (i + 1) * midSpacing, y: midY });
      }

      // Attackers
      const attY = 78;
      const attSpacing = 100 / (att + 1);
      for (let i = 0; i < att; i++) {
        positions.push({ x: (i + 1) * attSpacing, y: attY });
      }

      return positions;
    }

    async function fetchMatches() {
      try {
        const response = await fetch(`${API_BASE}/matches?year=2026`, {
          headers: { 'X-API-Key': API_KEY }
        });
        const data = await response.json();

        if (data && data.data) {
          matches = data.data.map(match => ({
            id: match.id,
            home: match.homeTeam,
            away: match.awayTeam,
            time: match.date,
            result: match.result,
            status: match.status === 'scheduled' || !match.status ? 'scheduled' : (match.status === 'live' ? 'live' : 'completed'),
            minute: match.liveMinute || 0,
          }));
          return true;
        }
      } catch (error) {
        console.log('Error fetching matches:', error.message);
      }
      return false;
    }

    function showLiveMatch(match) {
      const liveMatch = document.getElementById('liveMatch');
      const noLive = document.getElementById('noLive');

      if (match.status !== 'live') {
        noLive.style.display = 'block';
        liveMatch.classList.remove('active');
        return;
      }

      document.getElementById('team1').textContent = match.home;
      document.getElementById('team2').textContent = match.away;
      document.getElementById('team1Flag').textContent = getFlag(match.home);
      document.getElementById('team2Flag').textContent = getFlag(match.away);
      document.getElementById('liveTime').textContent = `Minute ${match.minute}'`;

      if (match.result) {
        const [s1, s2] = match.result.split('-');
        document.getElementById('score1').textContent = s1;
        document.getElementById('score2').textContent = s2;
      }

      noLive.style.display = 'none';
      liveMatch.classList.add('active');
    }

    function updateTicker() {
      const ticker = document.getElementById('ticker');
      ticker.innerHTML = '';

      const items = [
        'рЯУК World Cup 2026 Live',
        'вЪљ 48 Teams | 12 Groups',
        'рЯМН Click teams to see formation',
        'рЯУ° Real-time updates',
      ];

      const tickerItems = [...items, ...items];
      tickerItems.forEach(text => {
        const item = document.createElement('div');
        item.className = 'ticker-item';
        item.innerHTML = `<div class="ticker-dot"></div><div>${text}</div>`;
        ticker.appendChild(item);
      });
    }

    async function init() {
      updateTicker();
      await fetchTeams();
      const success = await fetchMatches();

      if (success) {
        const liveMatch = matches.find(m => m.status === 'live');
        if (liveMatch) showLiveMatch(liveMatch);

        setInterval(() => {
          fetchMatches().then(success => {
            if (success) {
              const liveMatch = matches.find(m => m.status === 'live');
              if (liveMatch) showLiveMatch(liveMatch);
            }
          });
        }, 30000);
      }
    }

    init();
  </script>
</body>
</html>
